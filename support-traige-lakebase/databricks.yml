bundle:
  name: support-portal

include:
  - variables.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-serverless-bir.cloud.databricks.com
      profile: vm

  prod:
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com/
      root_path: /Workspace/bir_support/prod
      profile: e2demofe
    variables:
      app_name: support-portal-prod
      lakebase_instance_name: bir-support-lakebase
      lakebase_bound_database: databricks_postgres

resources:
  apps:
    support-portal:
      name: ${var.app_name}
      description: ${var.app_description}
      source_code_path: .
      config:
        command:
          - uv
          - run
          - start-app
        env:
          - name: LAKEBASE_PROJECT
            value: ${var.lakebase_project}
          - name: LAKEBASE_BRANCH
            value: ${var.lakebase_branch}
          - name: LAKEBASE_ENDPOINT
            value: ${var.lakebase_endpoint}
          - name: LAKEBASE_DATABASE
            value: ${var.lakebase_database}
          - name: LAKEBASE_HOST
            value: ${var.lakebase_host}
          - name: LAKEBASE_INSTANCE_NAME
            value: ${var.lakebase_instance_name}
      resources:
        - name: database
          database:
            instance_name: ${var.lakebase_instance_name}
            database_name: ${var.lakebase_bound_database}
            permission: ${var.lakebase_permission}
      permissions:
        - user_name: ${var.app_manage_user}
          level: CAN_MANAGE
