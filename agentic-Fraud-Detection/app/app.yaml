command:
  - uvicorn
  - app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

env:
  - name: LAKEBASE_HOST
    value: "localhost"
  - name: LAKEBASE_DB
    value: "fraud_ops"
  - name: LAKEBASE_INSTANCE
    value: "fraud-triage-ops"

resources:
  - name: sql-warehouse
    sql_warehouse:
      id: "REPLACE_ME"
      permission: CAN_USE
