command:
  - streamlit
  - run
  - streamlit_app.py

env:
  - name: APP_ENVIRONMENT
    description: "Deployment environment (dev or prod)"
    value: "prod"
  - name: QUERY_CACHE_TTL_SECONDS
    description: "Cache TTL for SQL query results in seconds"
    value: "300"
  - name: LAKEBASE_HOST
    description: "Lakebase PostgreSQL host"
    value: "instance-9278b37e-e9ea-452a-8b18-ba7c58bc919c.database.cloud.databricks.com"
  - name: LAKEBASE_PORT
    description: "Lakebase PostgreSQL port"
    value: "5432"
  - name: LAKEBASE_DATABASE
    description: "Lakebase database name"
    value: "databricks_postgres"
  - name: LAKEBASE_USER
    description: "Lakebase user (app service principal)"
    value: "9d3176ae-0089-4471-a4bb-624b78e4c73f"
